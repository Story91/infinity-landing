<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F6AE8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0B0F2E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B9BDB" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#4F6AE8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4F6AE8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="#0B0F2E"/>
  <rect width="400" height="200" fill="url(#glow1)"/>

  <!-- Central glow -->
  <ellipse cx="200" cy="100" rx="120" ry="80" fill="#4F6AE8" opacity="0.06" filter="url(#blur1)"/>

  <!-- Brain outline - left hemisphere -->
  <path d="M170 45 Q140 45 130 65 Q118 85 125 105 Q120 115 128 130 Q135 148 155 155 Q170 160 185 155 Q195 150 200 140"
        fill="none" stroke="#2E4AAD" stroke-width="1.5" opacity="0.5"/>
  <!-- Brain outline - right hemisphere -->
  <path d="M230 45 Q260 45 270 65 Q282 85 275 105 Q280 115 272 130 Q265 148 245 155 Q230 160 215 155 Q205 150 200 140"
        fill="none" stroke="#2E4AAD" stroke-width="1.5" opacity="0.5"/>
  <!-- Brain center line -->
  <path d="M200 40 L200 155" stroke="#2E4AAD" stroke-width="0.8" opacity="0.3"/>

  <!-- Neural connections - lines -->
  <g stroke="#4F6AE8" stroke-width="0.8" opacity="0.4">
    <!-- Layer 1 to 2 -->
    <line x1="145" y1="60" x2="175" y2="80"/>
    <line x1="145" y1="60" x2="170" y2="105"/>
    <line x1="140" y1="90" x2="175" y2="80"/>
    <line x1="140" y1="90" x2="170" y2="105"/>
    <line x1="140" y1="90" x2="165" y2="130"/>
    <line x1="135" y1="120" x2="170" y2="105"/>
    <line x1="135" y1="120" x2="165" y2="130"/>
    <!-- Layer 2 to 3 -->
    <line x1="175" y1="80" x2="200" y2="70"/>
    <line x1="175" y1="80" x2="200" y2="100"/>
    <line x1="170" y1="105" x2="200" y2="100"/>
    <line x1="170" y1="105" x2="200" y2="130"/>
    <line x1="165" y1="130" x2="200" y2="100"/>
    <line x1="165" y1="130" x2="200" y2="130"/>
    <!-- Layer 3 to 4 -->
    <line x1="200" y1="70" x2="230" y2="80"/>
    <line x1="200" y1="70" x2="225" y2="105"/>
    <line x1="200" y1="100" x2="230" y2="80"/>
    <line x1="200" y1="100" x2="225" y2="105"/>
    <line x1="200" y1="100" x2="235" y2="130"/>
    <line x1="200" y1="130" x2="225" y2="105"/>
    <line x1="200" y1="130" x2="235" y2="130"/>
    <!-- Layer 4 to 5 -->
    <line x1="230" y1="80" x2="260" y2="65"/>
    <line x1="230" y1="80" x2="255" y2="95"/>
    <line x1="225" y1="105" x2="255" y2="95"/>
    <line x1="225" y1="105" x2="260" y2="120"/>
    <line x1="235" y1="130" x2="255" y2="95"/>
    <line x1="235" y1="130" x2="260" y2="120"/>
  </g>

  <!-- Highlight connections -->
  <g stroke="#7B9BDB" stroke-width="1.2" opacity="0.6">
    <line x1="145" y1="60" x2="175" y2="80"/>
    <line x1="175" y1="80" x2="200" y2="70"/>
    <line x1="200" y1="70" x2="230" y2="80"/>
    <line x1="230" y1="80" x2="260" y2="65"/>
  </g>

  <!-- Neural nodes - Layer 1 (input) -->
  <circle cx="145" cy="60" r="5" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="145" cy="60" r="2" fill="#7B9BDB"/>
  <circle cx="140" cy="90" r="5" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="140" cy="90" r="2" fill="#4F6AE8"/>
  <circle cx="135" cy="120" r="5" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="135" cy="120" r="2" fill="#4F6AE8"/>

  <!-- Layer 2 -->
  <circle cx="175" cy="80" r="6" fill="#1A2461" stroke="#7B9BDB" stroke-width="1.5"/>
  <circle cx="175" cy="80" r="3" fill="#7B9BDB"/>
  <circle cx="170" cy="105" r="5" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="170" cy="105" r="2.5" fill="#4F6AE8"/>
  <circle cx="165" cy="130" r="5" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="165" cy="130" r="2" fill="#4F6AE8"/>

  <!-- Layer 3 (center) -->
  <circle cx="200" cy="70" r="7" fill="#1A2461" stroke="#7B9BDB" stroke-width="2"/>
  <circle cx="200" cy="70" r="3.5" fill="#7B9BDB"/>
  <circle cx="200" cy="100" r="8" fill="#1A2461" stroke="#7B9BDB" stroke-width="2"/>
  <circle cx="200" cy="100" r="4" fill="#D6E4FF"/>
  <circle cx="200" cy="100" r="12" fill="url(#nodeGlow)" opacity="0.5"/>
  <circle cx="200" cy="130" r="6" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="200" cy="130" r="3" fill="#4F6AE8"/>

  <!-- Layer 4 -->
  <circle cx="230" cy="80" r="6" fill="#1A2461" stroke="#7B9BDB" stroke-width="1.5"/>
  <circle cx="230" cy="80" r="3" fill="#7B9BDB"/>
  <circle cx="225" cy="105" r="5" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="225" cy="105" r="2.5" fill="#4F6AE8"/>
  <circle cx="235" cy="130" r="5" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="235" cy="130" r="2" fill="#4F6AE8"/>

  <!-- Layer 5 (output) -->
  <circle cx="260" cy="65" r="5" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="260" cy="65" r="2.5" fill="#7B9BDB"/>
  <circle cx="255" cy="95" r="5" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="255" cy="95" r="2" fill="#4F6AE8"/>
  <circle cx="260" cy="120" r="5" fill="#1A2461" stroke="#4F6AE8" stroke-width="1.5"/>
  <circle cx="260" cy="120" r="2" fill="#4F6AE8"/>

  <!-- Floating particles -->
  <circle cx="90" cy="40" r="1.5" fill="#4F6AE8" opacity="0.4"/>
  <circle cx="310" cy="35" r="1" fill="#7B9BDB" opacity="0.3"/>
  <circle cx="75" cy="150" r="1.2" fill="#2E4AAD" opacity="0.5"/>
  <circle cx="330" cy="160" r="1.8" fill="#4F6AE8" opacity="0.3"/>
  <circle cx="50" cy="100" r="0.8" fill="#7B9BDB" opacity="0.4"/>
  <circle cx="350" cy="90" r="1.3" fill="#2E4AAD" opacity="0.4"/>
  <circle cx="110" cy="170" r="1" fill="#4F6AE8" opacity="0.3"/>
  <circle cx="290" cy="170" r="0.8" fill="#7B9BDB" opacity="0.35"/>

  <!-- Outer connection hints -->
  <line x1="90" y1="40" x2="145" y2="60" stroke="#4F6AE8" stroke-width="0.4" opacity="0.2"/>
  <line x1="310" y1="35" x2="260" y2="65" stroke="#4F6AE8" stroke-width="0.4" opacity="0.2"/>
  <line x1="75" y1="150" x2="135" y2="120" stroke="#2E4AAD" stroke-width="0.4" opacity="0.2"/>
  <line x1="330" y1="160" x2="260" y2="120" stroke="#2E4AAD" stroke-width="0.4" opacity="0.2"/>
</svg>