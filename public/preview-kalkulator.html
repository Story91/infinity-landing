<!--
aesthetic_dna: Futuristic HUD / Holographic Command Center
ui_paradigm: Radial Orbital Dashboard with Central Aggregate Data Core
-->
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ROI Command Center — Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: { 900: '#050B1F', 800: '#0A1628', 700: '#0B0F2E', border: '#1E2C4A' },
                        core: { light: '#7B9BDB', base: '#4F6AE8', dark: '#2E4AAD' }
                    },
                    fontFamily: { hud: ['Rajdhani', 'sans-serif'], mono: ['Space Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050B1F; background-image: radial-gradient(circle at 50% 50%, rgba(46,74,173,0.15) 0%, transparent 60%), linear-gradient(rgba(10,22,40,0.9), rgba(5,11,31,0.95)); color: #e2e8f0; overflow-x: hidden; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
        .bg-grid { position: fixed; inset: 0; background-size: 50px 50px; background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px); z-index: -1; pointer-events: none; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent, rgba(79,106,232,0.05) 50%, rgba(79,106,232,0.3) 51%, transparent 52%); background-size: 100% 200%; animation: scan 8s linear infinite; pointer-events: none; z-index: 50; mix-blend-mode: screen; }
        @keyframes scan { 0% { background-position: 0 -100vh; } 100% { background-position: 0 100vh; } }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #050B1F; } ::-webkit-scrollbar-thumb { background: #2E4AAD; border-radius: 10px; }
        .holo-stage { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .orbit-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 1px dashed rgba(123,155,219,0.2); border-radius: 50%; pointer-events: none; z-index: 1; }
        .orbit-ring-1 { width: 660px; height: 660px; animation: spin-slow 120s linear infinite; }
        .orbit-ring-2 { width: 860px; height: 860px; animation: spin-slow-reverse 180s linear infinite; opacity: 0.5; }
        .core-hub { position: absolute; z-index: 20; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at center, rgba(10,22,40,0.95), rgba(5,11,31,0.98)); border: 1px solid rgba(79,106,232,0.4); box-shadow: 0 0 40px rgba(79,106,232,0.1), inset 0 0 30px rgba(79,106,232,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(12px); transition: all 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
        .core-hub.active-pulse { box-shadow: 0 0 60px rgba(79,106,232,0.3), inset 0 0 40px rgba(79,106,232,0.4); border-color: rgba(79,106,232,0.8); }
        .core-ring { position: absolute; inset: -15px; border-radius: 50%; border: 2px solid transparent; border-top-color: #4F6AE8; border-right-color: rgba(79,106,232,0.3); animation: spin 8s linear infinite; }
        #connections-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .beam { stroke-dasharray: 10; animation: flow 1s linear infinite; filter: drop-shadow(0 0 8px currentColor); transition: opacity 0.4s ease; }
        @keyframes flow { to { stroke-dashoffset: -20; } }
        .process-node { position: absolute; z-index: 10; width: 160px; background: rgba(10,22,40,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); transform-origin: center; margin-top: -50px; margin-left: -80px; }
        .process-node:hover { transform: scale(1.05) translateY(-5px); background: rgba(10,22,40,0.9); box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 30; }
        .process-node::before { content: ''; position: absolute; inset: 0; border-radius: 12px; padding: 1px; background: linear-gradient(180deg, var(--node-color, rgba(255,255,255,0.2)), transparent, transparent); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; opacity: 0.3; transition: opacity 0.3s; }
        .process-node[data-selected="true"] { background: rgba(10,22,40,0.85); border-color: var(--node-color); transform: scale(1.1); }
        .process-node[data-selected="true"]::before { opacity: 1; }
        .node-icon-wrapper { display: inline-flex; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.03); color: var(--node-color, #7B9BDB); margin-bottom: 8px; transition: all 0.3s; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-slow { 100% { transform: translate(-50%,-50%) rotate(360deg); } }
        @keyframes spin-slow-reverse { 100% { transform: translate(-50%,-50%) rotate(-360deg); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .pop-anim { animation: pop 0.4s ease forwards; }
        @media (max-width: 1024px) {
            .holo-stage { height: auto; min-height: 100vh; display: block; padding-top: 100px; padding-bottom: 100px; }
            .orbit-ring, #connections-layer { display: none; }
            .core-hub { position: relative; margin: 0 auto 40px auto; width: 250px; height: 250px; }
            #nodes-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 16px; position: relative; }
            .process-node { position: relative; width: 100%; margin: 0; transform: none !important; left: auto !important; top: auto !important; }
            .process-node:hover { transform: translateY(-5px) !important; }
        }
    </style>
</head>
<body class="antialiased selection:bg-core-base selection:text-white">
    <div class="bg-grid"></div>
    <div class="scanline"></div>
    <header class="fixed top-0 left-0 w-full p-6 flex justify-between items-start z-50 pointer-events-none">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 border border-core-dark bg-space-800/80 backdrop-blur rounded flex items-center justify-center relative overflow-hidden">
                <i class="ph ph-hexagon-fill text-2xl text-core-light"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-widest text-white uppercase filter drop-shadow-[0_0_8px_rgba(79,106,232,0.6)]">Nexus ROI</h1>
                <p class="text-xs font-mono text-core-light/70 uppercase tracking-widest">Infinity Tech — Kalkulator ROI</p>
            </div>
        </div>
        <div class="text-right flex flex-col items-end">
            <div class="flex items-center gap-2 mb-1"><span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span><span class="text-xs font-mono text-emerald-400 uppercase">System Online</span></div>
            <div class="font-mono text-xs text-core-light/50 border border-space-border px-2 py-1 rounded bg-space-800/50 backdrop-blur">UPLINK: <span id="clock">00:00:00</span></div>
        </div>
    </header>
    <main class="holo-stage">
        <div class="orbit-ring orbit-ring-1"></div>
        <div class="orbit-ring orbit-ring-2"></div>
        <svg id="connections-layer"></svg>
        <div class="core-hub" id="central-hub">
            <div class="core-ring"></div>
            <div class="text-center z-10 w-full px-4">
                <p class="text-xs font-mono text-core-light/70 tracking-[0.2em] mb-1 uppercase">Szacowany Zwrot (ROI)</p>
                <div class="text-5xl font-bold text-white mb-4 relative inline-block" id="total-roi-container">
                    <span id="total-roi" class="tracking-tight filter drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">0</span><span class="text-3xl text-core-base">%</span>
                </div>
                <div class="w-full bg-space-900/80 border border-space-border rounded-lg p-3 backdrop-blur mt-2 flex justify-between items-center text-left">
                    <div><i class="ph-duotone ph-clock text-core-light mb-1"></i><p class="text-[10px] font-mono text-gray-400 uppercase">Zaoszczędzone Godziny</p></div>
                    <div class="font-mono text-lg font-bold text-emerald-400"><span id="total-hours">0</span>h/m</div>
                </div>
                <div class="mt-4 opacity-0 transition-opacity duration-500" id="action-prompt">
                    <button class="font-mono text-xs font-bold text-space-900 bg-core-light hover:bg-white hover:shadow-[0_0_20px_rgba(123,155,219,0.8)] px-6 py-2 rounded uppercase tracking-wider transition-all w-full">Generuj Raport</button>
                </div>
            </div>
        </div>
        <div id="nodes-container" class="w-full h-full lg:w-0 lg:h-0 absolute top-[50%] left-[50%]"></div>
    </main>
    <footer class="fixed bottom-0 left-0 w-full border-t border-space-border/50 bg-space-900/80 backdrop-blur-md p-2 flex justify-between items-center z-50 font-mono text-[10px] text-gray-500 pointer-events-none hidden md:flex">
        <div class="flex gap-4"><span class="flex items-center gap-1"><i class="ph ph-cpu"></i> CORE LOAD: 14%</span><span class="flex items-center gap-1"><i class="ph ph-wifi-high"></i> LATENCY: 12ms</span></div>
        <div class="flex gap-4 text-core-light/40"><span>// WYBIERZ OBSZARY DO OPTYMALIZACJI AI</span></div>
        <div class="flex gap-4"><span>DATABANK: WWA-01</span></div>
    </footer>
    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { hour12: false }); }, 1000);
        const processes = [
            { id: 'fin', name: 'Finanse i Księgowość', icon: 'ph-coins', color: '#10B981', roi: 145, hours: 120 },
            { id: 'hr', name: 'HR i Rekrutacja', icon: 'ph-users-three', color: '#F43F5E', roi: 210, hours: 85 },
            { id: 'cs', name: 'Obsługa Klienta', icon: 'ph-headset', color: '#06B6D4', roi: 320, hours: 250 },
            { id: 'crm', name: 'Sprzedaż i CRM', icon: 'ph-chart-line-up', color: '#F59E0B', roi: 180, hours: 90 },
            { id: 'mkt', name: 'Marketing', icon: 'ph-megaphone', color: '#8B5CF6', roi: 160, hours: 65 },
            { id: 'adm', name: 'Administracja', icon: 'ph-folders', color: '#94A3B8', roi: 110, hours: 140 },
            { id: 'it', name: 'IT i Operacje', icon: 'ph-terminal-window', color: '#3B82F6', roi: 280, hours: 160 },
            { id: 'log', name: 'Logistyka', icon: 'ph-truck', color: '#EAB308', roi: 195, hours: 110 },
            { id: 'law', name: 'Prawo i Compliance', icon: 'ph-scales', color: '#14B8A6', roi: 130, hours: 45 },
            { id: 'dat', name: 'Dane i Raportowanie', icon: 'ph-database', color: '#EC4899', roi: 400, hours: 180 }
        ];
        let selectedNodes = new Set(), currentTotalRoi = 0, currentTotalHours = 0;
        const container = document.getElementById('nodes-container'), svgLayer = document.getElementById('connections-layer'), roiDisplay = document.getElementById('total-roi'), hoursDisplay = document.getElementById('total-hours'), centralHub = document.getElementById('central-hub'), actionPrompt = document.getElementById('action-prompt'), roiContainer = document.getElementById('total-roi-container');
        const isMobile = window.innerWidth <= 1024;
        let centerX, centerY;
        function updateCenter() { const r = centralHub.getBoundingClientRect(); centerX = r.left + r.width/2; centerY = r.top + r.height/2; }
        function initInterface() {
            container.innerHTML = ''; svgLayer.innerHTML = ''; updateCenter();
            const radius = 380;
            processes.forEach((proc, i) => {
                let styleStr = `style="--node-color: ${proc.color};"`;
                if (!isMobile) {
                    const angle = (i * (360 / processes.length) - 90) * (Math.PI / 180);
                    const nx = Math.cos(angle) * radius, ny = Math.sin(angle) * radius;
                    styleStr = `style="--node-color: ${proc.color}; left: calc(50% + ${nx}px); top: calc(50% + ${ny}px);"`;
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('id', `path-${proc.id}`);
                    path.setAttribute('d', `M ${centerX} ${centerY} L ${centerX+nx} ${centerY+ny}`);
                    path.setAttribute('stroke', proc.color); path.setAttribute('stroke-width', '2'); path.setAttribute('fill', 'none'); path.setAttribute('class', 'beam'); path.style.opacity = '0';
                    svgLayer.appendChild(path);
                }
                container.insertAdjacentHTML('beforeend', `<div class="process-node group" id="node-${proc.id}" ${styleStr} data-id="${proc.id}" data-selected="false">
                    <div class="flex justify-between items-start mb-2"><div class="node-icon-wrapper"><i class="ph ${proc.icon} text-xl"></i></div><div class="w-4 h-4 rounded-full border border-space-border flex items-center justify-center indicator-bg"><div class="w-2 h-2 rounded-full bg-transparent indicator-core"></div></div></div>
                    <h3 class="text-sm font-semibold text-white leading-tight mb-1 group-hover:text-core-light transition-colors">${proc.name}</h3>
                    <div class="flex justify-between items-end mt-2"><span class="text-[10px] font-mono text-gray-500 uppercase">Potencjał</span><span class="font-mono text-sm font-bold" style="color:${proc.color}">+${proc.roi}%</span></div></div>`);
            });
            document.querySelectorAll('.process-node').forEach(node => {
                node.addEventListener('click', function() {
                    const id = this.dataset.id, sel = this.dataset.selected === 'true', d = processes.find(p=>p.id===id);
                    if (sel) { this.dataset.selected='false'; selectedNodes.delete(id); this.querySelector('.indicator-bg').style.background='transparent'; this.querySelector('.indicator-core').style.background='transparent'; if(!isMobile){document.getElementById(`path-${id}`).style.opacity='0';} }
                    else { this.dataset.selected='true'; selectedNodes.add(id); this.querySelector('.indicator-bg').style.borderColor=d.color; this.querySelector('.indicator-core').style.background=d.color; if(!isMobile){document.getElementById(`path-${id}`).style.opacity='0.6';} }
                    updateCore();
                });
            });
            document.querySelectorAll('.process-node').forEach((el,i) => { el.style.opacity='0'; el.style.transform=isMobile?'translateY(20px)':'scale(0.8)'; setTimeout(()=>{el.style.transition='all 0.6s cubic-bezier(0.34,1.56,0.64,1)';el.style.opacity='1';el.style.transform=isMobile?'translateY(0)':'scale(1)';setTimeout(()=>{el.style.transition='all 0.4s cubic-bezier(0.34,1.56,0.64,1)';},600);},i*100); });
        }
        function animVal(obj, start, end, dur) { let st=null; const step=(ts)=>{if(!st)st=ts;const p=Math.min((ts-st)/dur,1);const e=p*(2-p);obj.innerHTML=Math.floor(e*(end-start)+start);if(p<1)requestAnimationFrame(step);else obj.innerHTML=end;};requestAnimationFrame(step); }
        function updateCore() {
            let tR=0,tH=0;
            selectedNodes.forEach(id=>{const p=processes.find(p=>p.id===id);tH+=p.hours;tR+=p.roi;});
            if(selectedNodes.size>0){tR=Math.floor(tR/selectedNodes.size)+(selectedNodes.size*15);centralHub.classList.add('active-pulse');actionPrompt.classList.remove('opacity-0');actionPrompt.classList.add('opacity-100');}
            else{centralHub.classList.remove('active-pulse');actionPrompt.classList.remove('opacity-100');actionPrompt.classList.add('opacity-0');}
            animVal(roiDisplay,currentTotalRoi,tR,800); animVal(hoursDisplay,currentTotalHours,tH,800);
            roiContainer.classList.remove('pop-anim');void roiContainer.offsetWidth;roiContainer.classList.add('pop-anim');
            currentTotalRoi=tR;currentTotalHours=tH;
        }
        window.addEventListener('resize',()=>{if(!isMobile){updateCenter();const r=380;processes.forEach((p,i)=>{const a=(i*(360/processes.length)-90)*(Math.PI/180);const path=document.getElementById(`path-${p.id}`);if(path)path.setAttribute('d',`M ${centerX} ${centerY} L ${centerX+Math.cos(a)*r} ${centerY+Math.sin(a)*r}`);});}});
        initInterface();
    </script>
</body>
</html>
